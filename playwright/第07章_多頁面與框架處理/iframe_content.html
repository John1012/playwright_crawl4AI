<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iframe 內容頁面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: #f5f5f5;
            padding: 15px;
        }

        .iframe-container {
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 13px;
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        button:hover {
            background: #5a6fd6;
        }

        .success-message {
            display: none;
            background: #4caf50;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            text-align: center;
        }

        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <h3>📋 iframe 內的表單</h3>
        <form id="iframeForm">
            <div class="form-group">
                <label for="iframeName">姓名：</label>
                <input type="text" id="iframeName" name="name" placeholder="請輸入姓名">
            </div>
            <div class="form-group">
                <label for="iframeEmail">Email：</label>
                <input type="email" id="iframeEmail" name="email" placeholder="請輸入 Email">
            </div>
            <button type="submit" id="iframeSubmit">提交表單</button>
        </form>
        <div class="success-message" id="iframeSuccess">
            ✓ 表單已成功提交！
        </div>
    </div>

    <script>
        document.getElementById('iframeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('iframeName').value;
            const email = document.getElementById('iframeEmail').value;
            
            // 顯示成功訊息
            document.getElementById('iframeSuccess').classList.add('show');
            
            // 發送訊息給父視窗
            if (window.parent !== window) {
                window.parent.postMessage(
                    `姓名: ${name}, Email: ${email}`,
                    '*'
                );
            }
        });
    </script>
</body>
</html>
